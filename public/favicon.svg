<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Calculator body -->
  <rect x="3" y="2" width="26" height="28" rx="3" fill="white" opacity="0.95"/>
  <!-- Display -->
  <rect x="4.5" y="4" width="23" height="7" rx="1.5" fill="#d1fae5"/>
  <!-- Buttons row 1 -->
  <rect x="4.5" y="13" width="4.5" height="3.5" rx="0.8" fill="#fef2f2"/><text x="6.75" y="15.5" font-size="2" fill="#ef4444" text-anchor="middle" font-family="sans-serif">C</text>
  <rect x="10" y="13" width="4.5" height="3.5" rx="0.8" fill="#e2e8f0"/><text x="12.25" y="15.5" font-size="2" fill="#475569" text-anchor="middle" font-family="sans-serif">÷</text>
  <rect x="15.5" y="13" width="4.5" height="3.5" rx="0.8" fill="#e2e8f0"/><text x="17.75" y="15.5" font-size="2" fill="#475569" text-anchor="middle" font-family="sans-serif">×</text>
  <rect x="21" y="13" width="4.5" height="3.5" rx="0.8" fill="#e2e8f0"/><text x="23.25" y="15.5" font-size="2" fill="#475569" text-anchor="middle" font-family="sans-serif">−</text>
  <!-- Buttons row 2 -->
  <rect x="4.5" y="17.5" width="4.5" height="3.5" rx="0.8" fill="#e2e8f0"/><text x="6.75" y="20" font-size="2" fill="#475569" text-anchor="middle" font-family="sans-serif">7</text>
  <rect x="10" y="17.5" width="4.5" height="3.5" rx="0.8" fill="#e2e8f0"/><text x="12.25" y="20" font-size="2" fill="#475569" text-anchor="middle" font-family="sans-serif">8</text>
  <rect x="15.5" y="17.5" width="4.5" height="3.5" rx="0.8" fill="#e2e8f0"/><text x="17.75" y="20" font-size="2" fill="#475569" text-anchor="middle" font-family="sans-serif">9</text>
  <rect x="21" y="17.5" width="4.5" height="7" rx="0.8" fill="#10b981"/><text x="23.25" y="22" font-size="2" fill="white" text-anchor="middle" font-family="sans-serif">+</text>
  <!-- Buttons row 3 -->
  <rect x="4.5" y="22" width="4.5" height="3.5" rx="0.8" fill="#e2e8f0"/><text x="6.75" y="24.5" font-size="2" fill="#475569" text-anchor="middle" font-family="sans-serif">4</text>
  <rect x="10" y="22" width="4.5" height="3.5" rx="0.8" fill="#e2e8f0"/><text x="12.25" y="24.5" font-size="2" fill="#475569" text-anchor="middle" font-family="sans-serif">5</text>
  <rect x="15.5" y="22" width="4.5" height="3.5" rx="0.8" fill="#e2e8f0"/><text x="17.75" y="24.5" font-size="2" fill="#475569" text-anchor="middle" font-family="sans-serif">6</text>
  <!-- Buttons row 4 -->
  <rect x="4.5" y="26.5" width="4.5" height="3.5" rx="0.8" fill="#e2e8f0"/><text x="6.75" y="29" font-size="2" fill="#475569" text-anchor="middle" font-family="sans-serif">1</text>
  <rect x="10" y="26.5" width="4.5" height="3.5" rx="0.8" fill="#e2e8f0"/><text x="12.25" y="29" font-size="2" fill="#475569" text-anchor="middle" font-family="sans-serif">2</text>
  <rect x="15.5" y="26.5" width="4.5" height="3.5" rx="0.8" fill="#e2e8f0"/><text x="17.75" y="29" font-size="2" fill="#475569" text-anchor="middle" font-family="sans-serif">3</text>
  <rect x="21" y="26.5" width="4.5" height="3.5" rx="0.8" fill="#10b981"/><text x="23.25" y="29" font-size="2" fill="white" text-anchor="middle" font-family="sans-serif">=</text>
</svg>
